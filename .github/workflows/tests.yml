name: Tests

on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 40
      matrix:
        python-version:
        - "3.10"
        - "3.11"
        - "3.12"
        - "3.13"
        - "3.14"
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0 - 2026.06.18
      with:
        fetch-depth: 0
    - name: Install uv
      uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2 -- 2026.07.08
      with:
        python-version: ${{ matrix.python-version }}
    - name: Sync dependencies
      run: uv sync --all-extras --group dev
    - name: Test
      run: uv run python -m unittest discover -v tests/
    - name: Style
      if: ${{ matrix.python-version == '3.14' }}
      run: uv run black --check . --diff
    - name: Package
      run: uv build
